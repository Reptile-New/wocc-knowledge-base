# Sonde temporaire (passe 3) : exécute l'extraction modifiée de bout en bout
# et commite les données régénérées sur cette branche pour vérification.
name: Probe loot sources
on:
  push:
    branches: [probe-loot-sources]
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer esbuild
        run: npm install esbuild --no-save
      - name: Extraction complète v0.23.0
        run: node scripts/extract.mjs v0.23.0 ./data
      - name: Vérifier le butin héroïque
        run: |
          echo "=== HEROIC_BOSS_LOOT.json ==="
          node -e "
            const d = require('./data/HEROIC_BOSS_LOOT.json');
            for (const [boss, entries] of Object.entries(d))
              console.log(boss, '→', entries.length, 'entrées');
            const hit = Object.values(d).flat().find(e => e.itemId === 'lunar_choir_leggings');
            if (!hit) { console.error('lunar_choir_leggings introuvable !'); process.exit(1); }
            console.log('lunar_choir_leggings OK :', JSON.stringify(hit));
          "
      - name: Commiter les données régénérées
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: régénération des données v0.23.0 avec HEROIC_BOSS_LOOT"
          git push
