# Sonde temporaire (passe 2) : structure des modules de butin manquants.
name: Probe loot sources
on:
  push:
    branches: [probe-loot-sources]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger la source du jeu (v0.23.0)
        run: |
          curl -sL "https://codeload.github.com/levy-street/world-of-claudecraft/tar.gz/refs/tags/v0.23.0" -o wocc.tar.gz
          mkdir game && tar xzf wocc.tar.gz -C game --strip-components=1
      - name: Structure des modules de butin
        run: |
          cd game
          echo "=== EXPORTS heroic_loot.ts ==="
          grep -n "^export\|^const\|rollGroup:" src/sim/content/heroic_loot.ts | head -40
          echo ""
          echo "=== heroic_loot.ts lignes 380-470 ==="
          sed -n '380,470p' src/sim/content/heroic_loot.ts
          echo ""
          echo "=== ysolei : qui est-ce ? ==="
          grep -rn "ysolei" src/sim/data.ts src/sim/content/*.ts 2>/dev/null | grep -v heroic_loot | head -10
          echo ""
          echo "=== EXPORTS drowned_litany_loot.ts + tête ==="
          grep -n "^export" src/sim/content/delves/drowned_litany_loot.ts
          head -50 src/sim/content/delves/drowned_litany_loot.ts
          echo ""
          echo "=== EXPORTS gathering.ts + extraits loot ==="
          grep -n "^export" src/sim/professions/gathering.ts | head -20
          grep -n "itemId" src/sim/professions/gathering.ts | head -15
          echo ""
          echo "=== EXPORTS zone3.ts (contient du loot ?) ==="
          grep -n "^export" src/sim/content/zone3.ts | head
          grep -n "data.ts importe zone3 ?" || grep -n "zone3\|heroic_loot\|drowned_litany" src/sim/data.ts | head
          echo ""
          echo "=== recettes de craft : où ? ==="
          find src/sim/professions -name "*.ts" | head -20
          grep -rn "^export" src/sim/professions/recipes.ts 2>/dev/null | head -10
