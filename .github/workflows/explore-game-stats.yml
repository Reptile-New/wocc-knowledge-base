# Workflow TEMPORAIRE (branche claude/item-images-mismatch-xn0qrq uniquement).
# Récupère les formules de combat/équipement du jeu pour recalculer le BiS
# de La Clauderie en tenant compte des bonus de sets. À SUPPRIMER ensuite.

name: Explore game stat formulas (temp)

on:
  push:
    branches: [claude/item-images-mismatch-xn0qrq]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: explore-stats
  cancel-in-progress: true

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout la knowledge base
        uses: actions/checkout@v4

      - name: Télécharger le code du jeu au tag courant
        run: |
          TAG=$(node -p "require('./data/_meta.json').tag")
          echo "Tag: $TAG"
          curl -sL -o /tmp/game.tar.gz "https://codeload.github.com/levy-street/world-of-claudecraft/tar.gz/refs/tags/$TAG"
          mkdir -p /tmp/game
          tar xzf /tmp/game.tar.gz -C /tmp/game --strip-components=1

      - name: Copier les fichiers de formules
        run: |
          cd /tmp/game
          DEST="$GITHUB_WORKSPACE/.claude-scratch/stats-src"
          for f in \
            src/sim/items.ts \
            src/sim/item_level.ts \
            src/sim/combat/damage.ts \
            src/sim/combat/set_procs.ts \
            src/sim/combat/equip_procs.ts \
            src/sim/combat/heal.ts \
            src/sim/content/classes.ts \
          ; do
            [ -f "$f" ] || { echo "absent: $f"; continue; }
            mkdir -p "$DEST/$(dirname "$f")"
            cp "$f" "$DEST/$f"
          done
          {
            echo "=== conversions de ratings / stats ==="
            grep -rn "hasteRating\|critRating\|RATING\|apPer\|spPer\|perAgi\|perStr\|perInt" src/sim --include='*.ts' | grep -v test | head -60
            echo
            echo "=== restrictions d'armure / équipement ==="
            grep -rn "armorType\|canEquip\|allowedArmor\|proficien" src/sim --include='*.ts' | grep -v test | head -40
            echo
            echo "=== emplacements d'équipement ==="
            grep -rn "EQUIP_SLOTS\|'ring'\|'neck'" src/sim/types.ts src/sim/items.ts 2>/dev/null | head -20
          } > "$GITHUB_WORKSPACE/.claude-scratch/stats-audit.txt"
          cat "$GITHUB_WORKSPACE/.claude-scratch/stats-audit.txt"

      - name: Commiter le résultat sur la branche
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .claude-scratch
          git commit -m "chore(temp): dump des formules de stats du jeu" || echo "rien à commiter"
          git push
