# Temporaire : extraction de la nouvelle version + notes de release officielles.
name: Update extract
on:
  push:
    branches: [update-extract]
jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Notes de release officielles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== RELEASE LATEST ==="
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/levy-street/world-of-claudecraft/releases/latest" \
            | jq -r '"TAG: " + .tag_name, "TITRE: " + (.name // ""), "PUBLIEE: " + .published_at, "BODY-DEBUT", .body' | head -c 60000
          echo ""
          echo "=== FIN RELEASE ==="
      - name: Extraction des nouvelles données
        run: |
          npm install esbuild --no-save
          node scripts/extract.mjs latest ./data
          cat data/_meta.json
      - name: Commiter sur cette branche
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: extraction de la nouvelle version du jeu"
          git push
