# Sonde temporaire (passe 4) : top 50 des guildes + position de La Clauderie.
name: Probe guild leaderboard
on:
  push:
    branches: [probe-guild-rank]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Top guildes
        run: |
          curl -s -m 15 "https://worldofclaudecraft.com/api/leaderboard?board=guilds&page=0&pageSize=50" -o /tmp/g.json
          echo "=== TOP 15 ==="
          jq -r '.leaders[]? | "\(.rank). \(.name) — \(.memberCount) membres, topLevel \(.topLevel), XP \(.totalLifetimeXp)"' /tmp/g.json | head -15
          echo "=== LA CLAUDERIE ==="
          jq -r '.leaders[]? | select(.name | test("clauderie"; "i")) | "rank=\(.rank) name=\(.name)"' /tmp/g.json
