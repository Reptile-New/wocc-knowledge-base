# Sonde temporaire (passe 3) : classement des guildes en direct.
name: Probe guild leaderboard
on:
  push:
    branches: [probe-guild-rank]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Classement des guildes en direct
        run: |
          for page in 1 2; do
            echo "--- page $page"
            curl -s -m 15 "https://worldofclaudecraft.com/api/leaderboard?board=guilds&page=$page&pageSize=50" -o /tmp/g.json
            jq -r '.leaders[]? | "\(.rank). \(.name) — \(.memberCount) membres, topLevel \(.topLevel)"' /tmp/g.json | head -30
            n=$(jq '.leaders | length' /tmp/g.json); [ "$n" = "0" ] && break
          done
