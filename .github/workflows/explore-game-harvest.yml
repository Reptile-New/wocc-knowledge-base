# Workflow TEMPORAIRE (branche claude/item-images-mismatch-xn0qrq uniquement).
# Question précise : au tag courant, le client permet-il de récolter les
# points de minerai/bois/herbe (qui appelle harvestNode ?). À SUPPRIMER ensuite.

name: Explore game harvest wiring (temp)

on:
  push:
    branches: [claude/item-images-mismatch-xn0qrq]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: explore-harvest
  cancel-in-progress: true

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout la knowledge base
        uses: actions/checkout@v4

      - name: Télécharger le code du jeu au tag courant
        run: |
          TAG=$(node -p "require('./data/_meta.json').tag")
          echo "Tag: $TAG"
          curl -sL -o /tmp/game.tar.gz "https://codeload.github.com/levy-street/world-of-claudecraft/tar.gz/refs/tags/$TAG"
          mkdir -p /tmp/game
          tar xzf /tmp/game.tar.gz -C /tmp/game --strip-components=1

      - name: Qui appelle harvestNode / affiche les nodes ?
        run: |
          cd /tmp/game
          mkdir -p "$GITHUB_WORKSPACE/.claude-scratch"
          {
            echo "=== references à harvestNode ==="
            grep -rn "harvestNode" src server 2>/dev/null || echo "(aucune hors sim)"
            echo
            echo "=== references à GATHER_NODES / gatherNode côté client/render/ui/world_api ==="
            grep -rn "GATHER_NODES\|gatherNode\|gather_node" src/game src/ui src/render src/world_api src/main.ts 2>/dev/null || echo "(aucune)"
            echo
            echo "=== mention 'gather' dans le guide joueur ==="
            grep -rn -i "gather\|mining\|herbalism\|logging" src/guide 2>/dev/null | head -40 || true
            echo
            echo "=== interactions du client (fichiers) ==="
            ls src/game 2>/dev/null || true
          } > "$GITHUB_WORKSPACE/.claude-scratch/harvest-wiring.txt"
          cat "$GITHUB_WORKSPACE/.claude-scratch/harvest-wiring.txt"
          # Copier les fichiers pertinents pour lecture
          DEST="$GITHUB_WORKSPACE/.claude-scratch/harvest-src"
          for f in $(grep -rl "harvestNode\|GATHER_NODES" src server --include='*.ts' 2>/dev/null | grep -v "^src/sim" | head -12); do
            mkdir -p "$DEST/$(dirname "$f")"
            cp "$f" "$DEST/$f"
          done
          [ -f src/game/interactions.ts ] && mkdir -p "$DEST/src/game" && cp src/game/interactions.ts "$DEST/src/game/" || true

      - name: Commiter le résultat sur la branche
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .claude-scratch
          git commit -m "chore(temp): audit du câblage client de la récolte" || echo "rien à commiter"
          git push
