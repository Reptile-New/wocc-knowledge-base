# Temporaire (passe 2) : test de bout en bout de l'extraction étendue
# (talents, sorts, recettes) — commite les données sur cette branche.
name: Probe talents
on:
  push:
    branches: [probe-talents]
jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Extraction complète v0.24.0
        run: |
          npm install esbuild --no-save
          node scripts/extract.mjs v0.24.0 ./data
      - name: Vérifier les nouveaux registres
        run: |
          node -e "
            const t = require('./data/TALENTS.json');
            const a = require('./data/ABILITIES.json');
            const r = require('./data/ALL_RECIPES.json');
            console.log('talents :', Object.entries(t).map(([c, n]) => c + '=' + n.length).join(' '));
            console.log('sorts :', Object.keys(a).length, '| recettes :', r.length);
            if (!t.mage || !Object.keys(a).length) process.exit(1);
          "
      - name: Commiter
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: extraction étendue v0.24.0 (talents, sorts, recettes)"
          git push
