# Workflow TEMPORAIRE (branche claude/item-images-mismatch-xn0qrq uniquement).
#
# Objectif : la session Claude Code qui travaille sur la page BiS de La Clauderie
# n'a pas accès réseau au repo du jeu. Ce workflow télécharge le code du jeu au
# tag courant de la knowledge base (comme le fait déjà update-knowledge-base.yml),
# inventorie tout ce qui touche au rendu des icônes d'objets, et committe le
# résultat dans .claude-scratch/ sur cette branche pour que la session puisse
# l'analyser. À SUPPRIMER avant tout merge.

name: Explore game item icons (temp)

on:
  push:
    branches: [claude/item-images-mismatch-xn0qrq]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: explore-icons
  cancel-in-progress: true

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout la knowledge base
        uses: actions/checkout@v4

      - name: Télécharger le code du jeu au tag courant
        run: |
          TAG=$(node -p "require('./data/_meta.json').tag")
          echo "Tag: $TAG"
          curl -sL -o /tmp/game.tar.gz "https://codeload.github.com/levy-street/world-of-claudecraft/tar.gz/refs/tags/$TAG"
          mkdir -p /tmp/game
          tar xzf /tmp/game.tar.gz -C /tmp/game --strip-components=1
          du -sh /tmp/game

      - name: Inventaire du repo du jeu
        run: |
          mkdir -p .claude-scratch
          ( cd /tmp/game && find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -printf '%10s %p\n' | sort -k2 ) > .claude-scratch/game-tree.txt
          echo "=== Fichiers au total ===" && wc -l .claude-scratch/game-tree.txt
          echo "=== Top niveau ===" && ls -la /tmp/game
          echo "=== Chemins évoquant des icônes/assets ==="
          grep -iE 'icon|sprite|atlas|asset|image|\.png|\.svg|\.webp' .claude-scratch/game-tree.txt | head -200 || true

      - name: Copier le code de résolution des icônes d'objets
        run: |
          cd /tmp/game
          DEST="$GITHUB_WORKSPACE/.claude-scratch/game-src"
          for f in \
            src/ui/icons.ts \
            src/ui/ui_icons.ts \
            src/ui/icon_prewarm.ts \
            src/ui/bags_view.ts \
            src/ui/char_window.ts \
            src/ui/char_view.ts \
            src/ui/item_armor_type.ts \
            docs/design/icon-system.md \
          ; do
            [ -f "$f" ] || { echo "absent: $f"; continue; }
            mkdir -p "$DEST/$(dirname "$f")"
            cp "$f" "$DEST/$f"
          done

      - name: Commiter le résultat sur la branche
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .claude-scratch
          git commit -m "chore(temp): dump du code/assets d'icônes du jeu pour analyse" || echo "rien à commiter"
          git push
