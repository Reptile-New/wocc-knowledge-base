# Workflow TEMPORAIRE (branche claude/item-images-mismatch-xn0qrq uniquement).
#
# Objectif : la session Claude Code qui travaille sur la page BiS de La Clauderie
# n'a pas accès réseau au repo du jeu. Ce workflow télécharge le code du jeu au
# tag courant de la knowledge base (comme le fait déjà update-knowledge-base.yml),
# inventorie tout ce qui touche au rendu des icônes d'objets, et committe le
# résultat dans .claude-scratch/ sur cette branche pour que la session puisse
# l'analyser. À SUPPRIMER avant tout merge.

name: Explore game item icons (temp)

on:
  push:
    branches: [claude/item-images-mismatch-xn0qrq]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: explore-icons
  cancel-in-progress: true

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout la knowledge base
        uses: actions/checkout@v4

      - name: Télécharger le code du jeu au tag courant
        run: |
          TAG=$(node -p "require('./data/_meta.json').tag")
          echo "Tag: $TAG"
          curl -sL -o /tmp/game.tar.gz "https://codeload.github.com/levy-street/world-of-claudecraft/tar.gz/refs/tags/$TAG"
          mkdir -p /tmp/game
          tar xzf /tmp/game.tar.gz -C /tmp/game --strip-components=1
          du -sh /tmp/game

      - name: Inventaire du repo du jeu
        run: |
          mkdir -p .claude-scratch
          ( cd /tmp/game && find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -printf '%10s %p\n' | sort -k2 ) > .claude-scratch/game-tree.txt
          echo "=== Fichiers au total ===" && wc -l .claude-scratch/game-tree.txt
          echo "=== Top niveau ===" && ls -la /tmp/game
          echo "=== Chemins évoquant des icônes/assets ==="
          grep -iE 'icon|sprite|atlas|asset|image|\.png|\.svg|\.webp' .claude-scratch/game-tree.txt | head -200 || true

      - name: Copier la table des variantes d'armes et leurs miniatures
        run: |
          cd /tmp/game
          DEST_SRC="$GITHUB_WORKSPACE/.claude-scratch/game-src"
          mkdir -p "$DEST_SRC/src/ui"
          cp src/ui/weapon_variants.ts "$DEST_SRC/src/ui/"
          DEST_AST="$GITHUB_WORKSPACE/.claude-scratch/game-assets/public/ui"
          mkdir -p "$DEST_AST"
          cp -r public/ui/weapons "$DEST_AST/weapons"

      - name: Rendre les icônes procédurales avec le moteur du jeu
        run: |
          cd /tmp/game
          npm install --no-save esbuild puppeteer-core
          # Point d'entrée : expose le moteur d'icônes du jeu à la page
          cat > icon_dump_entry.ts <<'TS'
          import { ITEMS } from './src/sim/data';
          import { iconCanvas, itemImageUrl } from './src/ui/icons';
          import { ITEM_WEAPON_VARIANTS } from './src/ui/weapon_variants';
          (window as any).api = {
            missing: () =>
              Object.keys(ITEMS).filter((id) => !itemImageUrl(id) && !ITEM_WEAPON_VARIANTS[id]),
            render: (id: string, size: number) => iconCanvas('item', id, size).toDataURL('image/png'),
          };
          (window as any).__ready = true;
          TS
          npx esbuild icon_dump_entry.ts --bundle --format=iife --outfile=/tmp/icon_bundle.js
          # Pilote : même approche que scripts/render_weapon_icons.mjs du jeu
          cat > icon_dump.mjs <<'MJS'
          import { readFileSync, mkdirSync, writeFileSync } from 'node:fs';
          import puppeteer from 'puppeteer-core';
          let BROWSER_PATH = '/usr/bin/google-chrome';
          try { ({ BROWSER_PATH } = await import('/tmp/game/scripts/browser_path.mjs')); } catch {}
          const OUT = process.env.GITHUB_WORKSPACE + '/.claude-scratch/game-rendered';
          mkdirSync(OUT, { recursive: true });
          const bundle = readFileSync('/tmp/icon_bundle.js', 'utf8');
          const html = `<!doctype html><html><body><script>${bundle}</script></body></html>`;
          const browser = await puppeteer.launch({ executablePath: BROWSER_PATH, headless: 'new', args: ['--no-sandbox'] });
          const page = await browser.newPage();
          page.on('pageerror', (e) => { console.error('PAGEERR', e.message); process.exitCode = 1; });
          await page.setContent(html, { waitUntil: 'load' });
          await page.waitForFunction('window.__ready === true', { timeout: 20000 });
          const ids = await page.evaluate('window.api.missing()');
          console.log(`${ids.length} items sans image statique — rendu procédural…`);
          for (const id of ids) {
            const dataUrl = await page.evaluate((i) => window.api.render(i, 128), id);
            writeFileSync(`${OUT}/${id}.png`, Buffer.from(dataUrl.split(',')[1], 'base64'));
          }
          await browser.close();
          console.log('OK');
          MJS
          node icon_dump.mjs
          ls "$GITHUB_WORKSPACE/.claude-scratch/game-rendered" | wc -l

      - name: Commiter le résultat sur la branche
        run: |
          git config user.name "wocc-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .claude-scratch
          git commit -m "chore(temp): dump du code/assets d'icônes du jeu pour analyse" || echo "rien à commiter"
          git push
