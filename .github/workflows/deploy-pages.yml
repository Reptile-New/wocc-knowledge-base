# Publie site/index.html (+ les données data/*.json dont il a besoin) sur
# GitHub Pages à chaque changement sur main. Se déclenche donc automatiquement
# après chaque mise à jour de la knowledge base par le workflow
# update-knowledge-base.yml (celui-ci pousse sur main, ce qui redéclenche
# ce workflow-ci).

name: Deploy WoCC Codex sur GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assembler le site (site/ + data/ + redirection racine)
        run: |
          mkdir -p _site/site
          cp -r site/. _site/site/
          cp -r data _site/data
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=site/index.html">
          <a href="site/index.html">WoCC Codex</a>
          EOF

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
