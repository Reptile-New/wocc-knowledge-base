    pieces: v => `pièces : ${v}`, bonus: v => `Bonus — ${v}`,
    pieceBonus: b => `${b.pieces} pièces : ${b.text}`,
    levels: (lo, hi) => `, niveaux ${lo}–${hi}`,
    hub: v => `capitale : ${v}`, pois: v => `lieux notables : ${v}`,
    resources: v => `ressources : ${v}`, node: (n, t) => `${n} gisement(s) de ${t.toLowerCase()}`,
    fishing: v => `pêche : ${v}`,
    welcome: v => `accueil : « ${v} »`,
  };

  const L = [];
  const tag = DATA._meta ? DATA._meta.tag : M.unknown;
  L.push(M.title(tag));
  L.push('');
  L.push(M.intro1);
  L.push(M.intro2);

  L.push('', `## ${M.hItems} (${ITEMS.length})`, '');
  for (const it of [...ITEMS].sort(sortItems)) {
    const p = [];
    p.push(`${tr(QUALITY_L, quality(it))}, ${tr(KIND_L, it.kind).toLowerCase()}`);
    if (it.slot) p.push(M.slot(tr(SLOT_L, it.slot)));
    if (it.armorType) p.push(tr(ARMORTYPE_L, it.armorType).toLowerCase());
    if (it.weapon) p.push(M.dmg(it.weapon));
    { const _p = itemStatParts(it); if (_p.length) p.push(_p.join(', ')); }
    if (it.bagSlots) p.push(M.bag(it.bagSlots));
    if (it.foodHp) p.push(M.restoreHp(it.foodHp));
    if (it.drinkMana) p.push(M.restoreMana(it.drinkMana));
    if (it.potionHp) p.push(M.potionHp(it.potionHp));
    if (it.potionMana) p.push(M.potionMana(it.potionMana));
    if (it.requiredClass) p.push(M.classes(it.requiredClass.map(c => tr(CLASS_L, c)).join(', ')));
    if (it.set) p.push(M.set(nameOf(byId.set, it.set)));
    if (it.sellValue) p.push(M.sell(moneyTxt(it.sellValue)));
    if (it.buyValue) p.push(M.buy(moneyTxt(it.buyValue)));
    if (it.questId) p.push(M.questItem(nameOf(byId.quest, it.questId)));
    const drops = (refs.droppedBy[it.id] || []).map(d => `${d.mob.name} (${pct(d.chance)}${d.heroic ? M.heroicTag : ''})`);
    if (drops.length) p.push(M.droppedBy(drops.join(', ')));
    const sold = (refs.soldBy[it.id] || []).map(n => n.name);
    if (sold.length) p.push(M.soldBy(sold.join(', ')));
    const rew = (refs.rewardOf[it.id] || []).map(q => M.quote(q.name));
    if (rew.length) p.push(M.rewardOf(rew.join(', ')));
    const need = (refs.neededBy[it.id] || []).map(q => M.quote(q.name));
    if (need.length) p.push(M.neededFor(need.join(', ')));
    L.push(`- **${it.name}** — ${p.join(' · ')}`);
  }

  L.push('', `## ${M.hMobs} (${MOBS.length})`, '');
  for (const m of [...MOBS].sort(sortMobs)) {
    const p = [];
    const rank = m.worldBoss ? 'WORLD BOSS' : m.boss ? 'BOSS' : m.elite ? M.eliteTag : m.rare ? M.rareTag : null;
    p.push(`${tr(FAMILY_L, m.family)}${rank ? ', ' + rank : ''}, ${levelText(m)}`);
    p.push(M.mobStats(Math.round(m.hpBase + m.hpPerLevel * m.minLevel), (m.dmgBase + m.dmgPerLevel * m.minLevel).toFixed(0), m.attackSpeed));
    const ab = mobAbilities(m).map(k => tr(ABILITY_L, k));
    if (ab.length) p.push(M.abilities(ab.join(', ')));
    const loot = [];
    for (const l of (m.loot || [])) {
      if (l.copper) loot.push(`${moneyTxt(l.copper)} (${pct(l.chance)})`);
      else if (l.itemId) loot.push(`${nameOf(byId.item, l.itemId)} (${pct(l.chance)})`);
    }
    if (loot.length) p.push(M.loot(loot.join(', ')));
    const kf = (refs.killedFor[m.id] || []).map(q => M.quote(q.name));
    if (kf.length) p.push(M.questTarget(kf.join(', ')));
    const dg = (refs.mobDungeons[m.id] || []).map(d => d.name);
    if (dg.length) p.push(M.foundIn(dg.join(', ')));
    L.push(`- **${m.name}** — ${p.join(' · ')}`);
  }

  L.push('', `## ${M.hQuests} (${QUESTS.length})`, '');
  for (const x of [...QUESTS].sort(sortQuests)) {
    L.push(`### ${x.name}${x.retired ? M.retiredTag : ''}`, '');
    L.push(`- ${M.giver(nameOf(byId.npc, x.giverNpcId))}${x.turnInNpcId && x.turnInNpcId !== x.giverNpcId ? M.turnIn(nameOf(byId.npc, x.turnInNpcId)) : ''}`);
    if (x.minLevel || x.suggestedPlayers)
      L.push(`- ${[x.minLevel && M.lvlReq(x.minLevel), x.suggestedPlayers && M.suggGroup(x.suggestedPlayers)].filter(Boolean).join(' · ')}`);
    const obj = (x.objectives || []).map(o => {
      if (o.type === 'kill') return M.kill(o.count, nameOf(byId.mob, o.targetMobId));
      if (o.type === 'collect') return M.collect(o.count, nameOf(byId.item, o.itemId));
      return o.label || o.type;
    });
    if (obj.length) L.push(`- ${M.objectives(obj.join(' ; '))}`);
    const rewards = x.itemRewards || {};
    const uniq = [...new Set(Object.values(rewards))];
    let rtxt = '';
    if (uniq.length === 1) rtxt = M.item1(nameOf(byId.item, uniq[0]));
    else if (uniq.length > 1) rtxt = M.itemByClass(Object.entries(rewards).map(([c, i]) => `${tr(CLASS_L, c)} → ${nameOf(byId.item, i)}`).join(', '));
    L.push(`- ${M.rewards(x.xpReward)}${x.copperReward ? `, ${moneyTxt(x.copperReward)}` : ''}${rtxt}`);
    if (x.requiresQuest) L.push(`- ${M.requires(nameOf(byId.quest, x.requiresQuest))}`);
    const next = (refs.questNext[x.id] || []).map(n => M.quote(n.name));
    if (next.length) L.push(`- ${M.followedBy(next.join(', '))}`);
    if (x.text) L.push(`- ${M.journal(x.text)}`);
    L.push('');
  }

  L.push(`## ${M.hNpcs} (${NPCS.length})`, '');
  for (const n of [...NPCS].sort(sortName)) {
    const p = [];
    if (n.title) p.push(n.title);
    const qs = (refs.npcQuests[n.id] || []).map(q => M.quote(q.name));
    if (qs.length) p.push(M.givesQuests(qs.join(', ')));
    const v = (n.vendorItems || []).map(id => {
      const it = byId.item[id];
      return it ? `${it.name}${it.buyValue ? ` (${moneyTxt(it.buyValue)})` : ''}` : id;
    });
    if (v.length) p.push(M.sells(v.join(', ')));
    if (n.market) p.push(M.market);
    if (n.greeting) p.push(M.greeting(n.greeting));
    L.push(`- **${n.name}** — ${p.join(' · ')}`);
  }

  L.push('', `## ${M.hDungeons} (${DUNGEONS.length})`, '');
  for (const d of DUNGEONS) {
    const cnt = {};
    for (const s of (d.spawns || [])) cnt[s.mobId] = (cnt[s.mobId] || 0) + 1;
    const bosses = [], trash = [];
    for (const [id, n] of Object.entries(cnt)) {
      const m = byId.mob[id];
      (m && m.boss ? bosses : trash).push(`${m ? m.name : id}${n > 1 ? ` (×${n})` : ''}`);
    }
    const p = [];
    if (d.suggestedPlayers) p.push(M.suggGroup(d.suggestedPlayers));
    if (bosses.length) p.push(M.boss(bosses.join(', ')));
    if (trash.length) p.push(M.trash(trash.join(', ')));
    L.push(`- **${d.name}** — ${p.join(' · ')}`);
  }

  L.push('', `## ${M.hDelves} (${DELVES.length})`, '');
  for (const d of DELVES) {
    const p = [];
    if (d.minLevel) p.push(M.lvlPlus(d.minLevel));
    p.push(M.maxPlayers(d.maxPlayers));
    const b = (d.bosses || []).map(id => nameOf(byId.mob, id));
    if (b.length) p.push(M.boss(b.join(', ')));
    if (d.autoCompanionId) p.push(M.companion(companionName(d.autoCompanionId)));
    const tiers = (d.tiers || []).map(t => M.tier(t));
    if (tiers.length) p.push(M.tiers(tiers.join(', ')));
    L.push(`- **${d.name}** — ${p.join(' · ')}`);
  }

  if (WORLDBOSSES.length) {
    L.push('', `## ${M.hWorldbosses} (${WORLDBOSSES.length})`, '');
    for (const w of WORLDBOSSES) {
      const m = byId.mob[w.templateId];
      const p = [M.respawn(duration(w.intervalSeconds))];
      if (w.hpScale) p.push(M.hpScale(w.hpScale));
      if (w.pos) p.push(M.pos(w.pos));
      L.push(`- **${m ? m.name : w.templateId}** — ${p.join(' · ')}`);
    }
  }

  L.push('', `## ${M.hSets} (${SETS.length})`, '');
  for (const s of [...SETS].sort(sortName)) {
    const pieces = (refs.setPieces[s.id] || []).map(p => `${p.name} (${tr(SLOT_L, p.slot)})`);
    const bonuses = (s.bonuses || []).map(b => M.pieceBonus(b));
    L.push(`- **${s.name}** — ${M.pieces(pieces.join(', '))}. ${M.bonus(bonuses.join(' ; '))}`);
  }

  L.push('', `## ${M.hZones} (${ZONES.length})`, '');
  for (const z of ZONES) {
    const [lo, hi] = z.levelRange || [];
    const p = [`${tr(BIOME_L, z.biome)}${lo ? M.levels(lo, hi) : ''}`];
    if (z.hub) p.push(M.hub(z.hub.name));
    const pois = (z.pois || []).map(x => x.label);
    if (pois.length) p.push(M.pois(pois.join(', ')));
    const nodes = asList(DATA.GATHER_NODES).filter(g => g.zoneId === z.id);
    const nc = {};
    for (const g of nodes) nc[g.type] = (nc[g.type] || 0) + 1;
    if (nodes.length) p.push(M.resources(Object.entries(nc).map(([t, n]) => M.node(n, tr(NODE_L, t))).join(', ')));
    const fish = DATA.FISHING_TABLES && DATA.FISHING_TABLES[z.id];
    if (fish) {
      const tot = fish.reduce((a, f) => a + f.weight, 0);
      p.push(M.fishing(fish.filter(f => f.itemId).map(f => `${nameOf(byId.item, f.itemId)} (${Math.round(f.weight / tot * 100)}%)`).join(', ')));
    }
    if (z.welcome) p.push(M.welcome(z.welcome));
    L.push(`- **${z.name}** — ${p.join(' · ')}`);
  }

  return L.join('\n') + '\n';
}

function downloadMarkdown() {
  const blob = new Blob([buildMarkdown()], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wocc-codex-${DATA._meta ? DATA._meta.tag : 'donnees'}${LANG === 'en' ? '-en' : ''}.md`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

/* ================= routing par ancre ================= */

function applyHash() {
  const h = location.hash.slice(1);
  if (!h) return;
  const [a, b] = h.split('/');
  if (TABS.some(t => t.id === a) && !b) { activeTab = a; return; }
  const typeToTab = { item:'items', mob:'mobs', quest:'quests', npc:'npcs', dungeon:'dungeons', delve:'dungeons', worldboss:'worldbosses', set:'sets', zone:'zones' };
  if (b && typeToTab[a]) {
    activeTab = typeToTab[a];
    // L'onglet devient l'entrée d'historique « sous » la modale : le bouton
    // retour fermera la fiche au lieu de quitter la page.
    history.replaceState(null, '', '#' + activeTab);
    setTimeout(() => openSheet(a, b), 0);
  }
}

document.getElementById('search').addEventListener('input', renderAll);

load();
</script>
